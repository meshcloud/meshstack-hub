version: 1
frontend:
  buildpath: docs
  phases:
    preBuild:
      commands:
       - npm install gray-matter
       - sudo yum install -y golang
       - ( cd tools/render-meshstack-integration-tf; GOPATH=$PWD/.go go build . )
       - node index.ts
       - cd website
       - yarn install --frozen-lockfile
    build:
      commands:
        - yarn build:with-sitemap
  artifacts:
    baseDirectory: website/dist/website/browser
    files:
      - '**/*'
