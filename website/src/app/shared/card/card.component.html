<div class="card text-center" (click)="goToDetails()" style="cursor: pointer;">
    <div class="card-body">
            <img [src]="imageUrl" class="circled-image" alt="Card image">
    <h5 class="card-title mt-3 fw-bold">{{ title }}</h5>
      <p class="card-text">{{ description }}</p>
    </div>
  </div>
