<div class="bg-slate-50 min-h-screen" *ngIf="platform$ | async as platform">
  <!-- Breadcrumb at the top -->
  <div class="border-b border-slate-200 w-full">
    <div class="container mx-auto px-4 lg:px-8">
      <ng-container *ngIf="breadcrumbs$ | async as breadcrumbs">
        <mst-breadcrumb [breadcrumbs]="breadcrumbs"></mst-breadcrumb>
      </ng-container>
    </div>
  </div>

  <!-- Full Width Header -->
  <div class="bg-gradient-to-br from-primary-50 to-blue-50 border-b border-primary-100">
    <div class="container mx-auto px-4 py-6 md:py-8">
      <div class="flex flex-col md:flex-row items-start md:items-center gap-8">
        <div class="w-20 h-20 flex-shrink-0 flex items-center justify-center rounded-lg" [ngStyle]="{'background-color': (logoBackgroundColor$ | async)}">
          <img [src]="platform.logo" [alt]="platform.title" class="w-14 h-14 object-contain" />
        </div>
        <div class="flex-1 flex flex-col gap-2">
          <h1 class="text-2xl lg:text-3xl font-bold text-slate-900">{{ platform.title }}</h1>
          <p class="text-base text-slate-700 mb-1">{{ platform.description }}</p>

          <!-- Benefits -->
          <div *ngIf="platform.benefits && platform.benefits.length > 0" class="flex flex-wrap gap-4 mb-1">
            <span *ngFor="let benefit of platform.benefits" class="inline-flex items-center gap-1.5 text-sm text-slate-600">
              <i class="fa-solid fa-circle-check text-green-600"></i>
              <span>{{ benefit }}</span>
            </span>
          </div>

          <!-- Integrate Platform Button -->
          <div class="mt-2" *ngIf="hasIntegration">
            <a [routerLink]="['/platforms', currentPlatformType, 'integrate']"
               class="btn btn-primary whitespace-nowrap">
              Integrate Platform
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container mx-auto px-4 lg:px-8 py-8">
    <!-- Templates Section -->
    <ng-container *ngIf="templates$ | async as templates">
      <div class="mb-8">
        <h2 class="text-xl font-bold text-slate-900 mb-2">{{ platform.title }} Building Block Definitions</h2>
        <p class="text-base text-slate-600" *ngIf="templates.length; else noTemplates">
          Pre-configured Terraform modules for automating common {{ platform.title }} cloud tasks
        </p>
        <ng-template #noTemplates>
          <p class="text-base text-slate-500">No building block definitions available</p>
        </ng-template>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <div *ngFor="let template of templates">
          <mst-definition-card [card]="template"></mst-definition-card>
        </div>
      </div>
    </ng-container>
  </div>
</div>
